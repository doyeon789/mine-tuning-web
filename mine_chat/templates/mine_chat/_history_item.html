<div
  class="history-item{% if session.is_pinned %} pinned{% endif %}{% if active_session.pk == session.pk %} active{% endif %}"
  data-history-item
>
  <a
    class="history-link"
    href="{% url 'mine_chat:session_detail' session.pk %}"
  >
    <span class="history-link-text">{{ session.title }}</span>
  </a>
  {% if session.is_pinned %}
  <span class="history-pin-badge" aria-label="고정됨" title="고정됨">
    <svg class="history-pin-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path
        d="M14 4l6 6-4 1.2-3.8 3.8.3 4.5-1.4 1.4-4.2-4.2-4.2-4.2 1.4-1.4 4.5.3L12.4 7 14 4Z"
      ></path>
      <path d="M9 15l-5 5"></path>
    </svg>
  </span>
  {% endif %}
  <button
    class="history-menu-button"
    type="button"
    aria-label="채팅 메뉴"
    data-history-menu-button
  >
    •••
  </button>
  <div class="history-menu" data-history-menu hidden>
    <button
      class="history-menu-action"
      type="button"
      data-history-rename-button
    >
      <svg class="history-menu-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
      </svg>
      <span>이름 바꾸기</span>
    </button>
    <form
      class="history-rename-form"
      action="{% url 'mine_chat:session_update' session.pk %}"
      method="post"
      data-history-rename-form
      hidden
    >
      {% csrf_token %}
      <input
        class="history-rename-input"
        type="text"
        name="title"
        value="{{ session.title }}"
        required
      />
      <div class="history-rename-actions">
        <button class="history-menu-action primary" type="submit">저장</button>
        <button
          class="history-menu-action"
          type="button"
          data-history-rename-cancel
        >
          취소
        </button>
      </div>
    </form>
    <form action="{% url 'mine_chat:session_pin' session.pk %}" method="post">
      {% csrf_token %}
      <button
        class="history-menu-action{% if session.is_pinned %} pinned{% endif %}"
        type="submit"
      >
        <svg class="history-menu-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M14 4l6 6-4 1.2-3.8 3.8.3 4.5-1.4 1.4-4.2-4.2-4.2-4.2 1.4-1.4 4.5.3L12.4 7 14 4Z"
          ></path>
          <path d="M9 15l-5 5"></path>
        </svg>
        <span>{% if session.is_pinned %}고정 해제{% else %}채팅 고정{% endif %}</span>
      </button>
    </form>
    <div class="history-menu-separator" aria-hidden="true"></div>
    <form
      action="{% url 'mine_chat:session_delete' session.pk %}"
      method="post"
      data-confirm="이 채팅을 삭제할까요?"
    >
      {% csrf_token %}
      <button class="history-menu-action danger" type="submit">
        <svg class="history-menu-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 6h18"></path>
          <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
          <path d="M10 11v6"></path>
          <path d="M14 11v6"></path>
        </svg>
        <span>삭제</span>
      </button>
    </form>
  </div>
</div>
