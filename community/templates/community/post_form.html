{% extends "base.html" %}

{% block content %}
<main class="community-page community-form-page">
    <header class="community-header">
        <div>
            <a class="community-back-link" href="{% if post %}{% url 'community:post_detail' post.pk %}{% else %}{% url 'community:post_list' %}{% endif %}">← 돌아가기</a>
            <h1>{{ page_title }}</h1>
            <p>제목과 내용을 입력한 뒤 저장하세요.</p>
        </div>
    </header>

    <form class="community-form" method="post">
        {% csrf_token %}

        {% if form.non_field_errors %}
            <div class="form-errors">{{ form.non_field_errors }}</div>
        {% endif %}

        <label for="{{ form.title.id_for_label }}">제목</label>
        {{ form.title }}
        {{ form.title.errors }}

        <label for="{{ form.content.id_for_label }}">내용</label>
        {{ form.content }}
        {{ form.content.errors }}

        <div class="community-form-actions">
            <a class="community-secondary-link" href="{% url 'community:post_list' %}">취소</a>
            <button class="community-submit-button" type="submit">{{ submit_label }}</button>
        </div>
    </form>
</main>
{% endblock content %}
